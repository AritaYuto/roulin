name: Build native libs

# Manual trigger keeps CI minutes under explicit control. Tag pushes also
# fire this workflow so a release gets all five platform binaries attached
# automatically.
on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch / tag to build'
                required: true
                default: 'main'
                type: string
            platforms:
                description: 'Platforms to build (comma-separated, or "all")'
                required: false
                default: 'all'
                type: string
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: ${{ matrix.name }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-x86_64
                      runs-on: ubuntu-latest
                      task: cpp:linux:docker
                    - name: android-arm64
                      runs-on: ubuntu-latest
                      task: cpp:android:docker
                    - name: windows-x86_64
                      runs-on: windows-2022
                      task: cpp:windows
                    - name: macos-arm64
                      runs-on: macos-14
                      task: cpp:macos
                    - name: ios-arm64
                      runs-on: macos-14
                      task: cpp:ios
        runs-on: ${{ matrix.runs-on }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch || github.ref }}
                  submodules: recursive

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.22'

            - name: Install task runner
              uses: arduino/setup-task@v2
              with:
                  version: '3.x'
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run build task
              run: task ${{ matrix.task }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.name }}
                  path: dist/${{ matrix.name }}/
                  retention-days: 90
                  if-no-files-found: error

    release-attach:
        name: Attach binaries to release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts/

            - name: Zip per-platform
              run: |
                  cd artifacts
                  for d in */; do
                      name="${d%/}"
                      zip -r "roulin-${name}-${GITHUB_REF_NAME}.zip" "${name}"
                  done

            - name: Attach to release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/*.zip
                  fail_on_unmatched_files: true
