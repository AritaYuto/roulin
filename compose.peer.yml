# Dev with peer storage: local roulin-server fronting an S3-compatible
# store hosted on a peer machine (e.g. MinIO on a teammate's PC over VPN).
# Memory LRU (L1) + FS cache (L2) absorb the network round-trip after the
# first miss per blob.
#
# Required env:
#   ROULIN_STORAGE          e.g. s3://roulin-test/
#   ROULIN_STORAGE_ENDPOINT e.g. http://192.168.1.50:9000 (peer MinIO)
#   AWS_ACCESS_KEY_ID        Peer storage credential
#   AWS_SECRET_ACCESS_KEY    Peer storage credential
#
# Optional env:
#   ROULIN_PORT             Listen port (default 8765)
#   ROULIN_STORAGE_REGION   Region override (default us-east-1)
#   ROULIN_CACHE_MEMORY     L1 LRU upper bound in bytes (default 1 GiB)
#
# Usage:
#   docker compose -f compose.peer.yml up -d
services:
  roulin-server:
    build:
      context: tools/roulin
      dockerfile: ../../docker/roulin/Dockerfile
    ports:
      - "${ROULIN_PORT:-8765}:8765"
    volumes:
      - roulin-logs:/logs
      - roulin-cache:/cache
    command:
      - "serve"
      - "--storage=${ROULIN_STORAGE:?ROULIN_STORAGE required (e.g. s3://roulin-test/)}"
      - "--storage-endpoint=${ROULIN_STORAGE_ENDPOINT:?ROULIN_STORAGE_ENDPOINT required (remote MinIO URL)}"
      - "--storage-path-style"
      - "--storage-region=${ROULIN_STORAGE_REGION:-us-east-1}"
      - "--cache-memory=${ROULIN_CACHE_MEMORY:-1073741824}"
      - "--cache-dir=/cache"
      - "--port=8765"
      - "--log-dir=/logs"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID required (MinIO root user)}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY required (MinIO root password)}
    restart: unless-stopped

volumes:
  roulin-logs:
  roulin-cache:
