# Production: roulin-server only. Configure via environment variables.
#
# Minimum required env:
#   ROULIN_STORAGE        Storage URL, e.g. s3://my-bucket/assets/
#
# Optional env:
#   ROULIN_PORT             Listen port (default 8765)
#   ROULIN_STORAGE_REGION   Override AWS region (default: us-east-1)
#   ROULIN_CACHE_MEMORY     In-memory LRU upper bound in bytes (default 1 GiB)
#
# Usage:
#   ROULIN_STORAGE=s3://my-bucket/assets/ docker compose -f compose.prod.yml up -d
services:
  roulin-server:
    build:
      context: tools/roulin
      dockerfile: ../../docker/roulin/Dockerfile
    ports:
      - "${ROULIN_PORT:-8765}:8765"
    volumes:
      - roulin-logs:/logs
      - roulin-cache:/cache
    command:
      - "serve"
      - "--storage"
      - "${ROULIN_STORAGE:?ROULIN_STORAGE is required (e.g. s3://my-bucket/prefix)}"
      - "--storage-region"
      - "${ROULIN_STORAGE_REGION:-us-east-1}"
      - "--cache-memory"
      - "${ROULIN_CACHE_MEMORY:-1073741824}"
      - "--cache-dir"
      - "/cache"
      - "--port"
      - "8765"
      - "--log-dir"
      - "/logs"
    restart: unless-stopped

volumes:
  roulin-logs:
  roulin-cache:
