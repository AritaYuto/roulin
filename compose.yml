# Development environment: S3 (MinIO) test infra + roulin-server + debug tools.
# Usage: docker compose up
name: roulin

services:
  minio:
    container_name: roulin-minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio-data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-setup:
    container_name: roulin-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set test http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing test/roulin-dev &&
        mc anonymous set download test/roulin-dev &&
        echo 'MinIO ready'
      "
    restart: "no"

  roulin-server:
    container_name: roulin-server
    build:
      context: tools/roulin
      dockerfile: ../../docker/roulin/Dockerfile
    ports:
      - "8765:8765"
      - "2345:2345"
    volumes:
      - ./logs:/logs
    command:
      - serve
      - --storage=s3://roulin-dev
      - --storage-endpoint=http://minio:9000
      - --storage-path-style
      - --port=8765
      - --log-dir=/logs
    environment:
      - GODEBUG=gctrace=1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    depends_on:
      minio-setup:
        condition: service_completed_successfully

networks:
  default:
    name: roulin-net
