name: roulin

services:
  minio:
    container_name: roulin-minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio-data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-setup:
    container_name: roulin-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set test http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing test/roulin-dev &&
        mc anonymous set download test/roulin-dev &&
        echo 'MinIO ready'
      "
    restart: "no"

networks:
  default:
    name: roulin-net
